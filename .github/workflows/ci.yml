name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela corridas anteriores del mismo branch/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest

    # PostGIS como servicio; los defaults de settings.py apuntan acá.
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: spotwise
          POSTGRES_USER: spotwise
          POSTGRES_PASSWORD: spotwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spotwise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-insecure-key
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: spotwise
      POSTGRES_USER: spotwise
      POSTGRES_PASSWORD: spotwise
      # GOOGLE_PLACES_API_KEY se deja vacía a propósito: los tests mockean Places.

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Librerías de sistema (GeoDjango — GDAL/GEOS/PROJ)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Django check
        run: python manage.py check

      - name: Migraciones al día
        run: python manage.py makemigrations --check --dry-run

      - name: Tests
        run: python manage.py test --verbosity 2

  frontend:
    name: Frontend (lint + tests + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
