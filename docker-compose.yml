services:
  db:
    image: postgis/postgis:16-3.4
    container_name: spotwise_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: spotwise_backend
    # Migra, importa los barrios (idempotente: update_or_create) y levanta el server.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py importar_barrios &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: spotwise_frontend
    command: npm run dev
    environment:
      # El proxy /api de Vite apunta al servicio backend dentro de la red de compose.
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules # volumen anónimo: conserva los node_modules de la imagen
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
