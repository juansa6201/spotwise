# Producción (EC2): imágenes pre-construidas en GHCR, base en RDS (no hay
# contenedor de DB). Caddy termina TLS (HTTPS) y reenvía al nginx del frontend,
# que sirve el SPA y proxea /api al backend.
services:
  backend:
    image: ghcr.io/juansa6201/spotwise/backend:${TAG:-latest}
    restart: unless-stopped
    # Migra, importa barrios, junta estáticos y levanta gunicorn.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py importar_barrios &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env.prod
    expose:
      - "8000"

  frontend:
    image: ghcr.io/juansa6201/spotwise/frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    # Ya no publica al exterior: solo Caddy lo alcanza por la red interna.
    expose:
      - "80"

  # Reverse proxy con HTTPS automático (Let's Encrypt). Única puerta pública.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
