# Producción (EC2): imágenes pre-construidas en GHCR, base en RDS (no hay
# contenedor de DB). El frontend nginx publica el puerto 80 y proxea /api.
services:
  backend:
    image: ghcr.io/juansa6201/spotwise/backend:${TAG:-latest}
    restart: unless-stopped
    # Migra, importa barrios, junta estáticos y levanta gunicorn.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py importar_barrios &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env.prod
    expose:
      - "8000"

  frontend:
    image: ghcr.io/juansa6201/spotwise/frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
