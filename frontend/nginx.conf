# nginx del frontend: sirve el SPA y reenvía la API al backend (gunicorn).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API REST → backend Django.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin y estáticos de Django (admin/DRF), servidos por WhiteNoise.
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA: cualquier otra ruta cae en index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
